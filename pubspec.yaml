name: finplay
description: "FinPlay Interactive Gamification - Finance Simulation Game"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  socket_io_client: ^3.0.2

  # Navigation
  go_router: ^14.8.1

  # Storage
  shared_preferences: ^2.5.3

  # UI & Animation
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1

  # QR
  qr_flutter: ^4.1.0

  # Utilities
  path_provider: ^2.1.5

  # Native Splash
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.5.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1E3A8A"
  adaptive_icon_foreground: "assets/icons/app_icon_adaptive_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

# Native Splash Screen Configuration
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/splash_icon.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/icons/splash_icon.png
